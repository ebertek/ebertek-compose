# %YAML 1.2
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json  # yamllint disable-line
---
# version: "3.9"
name: tntphoto

x-common: &common
  restart: unless-stopped
  stop_grace_period: 1m

x-env: &env
  TZ: "UTC"

x-hc: &hc
  interval: 3m
  retries: 5
  start_interval: 5s
  start_period: 90s
  timeout: 10s

x-tz: &tz "/usr/share/zoneinfo/Etc/UTC:/etc/localtime:ro"

services:
  mariadb:
    <<: *common
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--innodb-use-native-aio=OFF"
    container_name: mariadb
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
        reservations:
          cpus: "0.1"
          memory: "160M"
    env_file: mariadb.txt
    environment:
      <<: *env
      MARIADB_AUTO_UPGRADE: "1"
    healthcheck:
      <<: *hc
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
    hostname: mariadb
    image: "docker.io/library/mariadb:latest"
    networks:
      - wp_net
    ports:
      - "127.0.0.1:3306:3306"
    ulimits:
      memlock: 262144
    volumes:
      - *tz
      - "/mnt/data/tntphoto_mariadb_config/_data/custom.cnf:/etc/mysql/conf.d/custom.cnf:ro"
      - "/mnt/data/tntphoto_mariadb_data/_data:/var/lib/mysql"

  nginx:
    <<: *common
    container_name: nginx
    depends_on:
      wordpress:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "128M"
        reservations:
          cpus: "0.05"
          memory: "16M"
    environment:
      <<: *env
      PUID: "101"
      PGID: "101"
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "nc -z localhost 443 || exit 1"]
    hostname: nginx
    image: "docker.io/nginx:alpine"
    networks:
      wp_net:
        aliases:
          - ebertek.com
          - www.ebertek.com
          - linda-ebert.com
          - www.linda-ebert.com
          - lindi-david.se
          - www.lindi-david.se
          - tnt.photo
          - www.tnt.photo
          - x.tnt.photo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - *tz
      - "/mnt/data/tntphoto_nginx_config/_data:/etc/nginx"
      - "/mnt/data/tntphoto_wordpress_data/_data:/var/www/html"
      - "/mnt/data/tntphoto_certbot_config/_data:/etc/nginx/ssl:ro"
      - "/mnt/data/tntphoto_certbot_data/_data:/var/www/certbot"
      - "/mnt/data/tntphoto_ebertek_data/_data:/var/www/ebertek"

  wordpress:
    <<: *common
    build:
      context: ./wordpress
    container_name: wordpress
    depends_on:
      mariadb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1536M"
        reservations:
          cpus: "0.1"
          memory: "192M"
    env_file: wordpress.txt
    environment:
      <<: *env
      PUID: "82"
      PGID: "82"
      WORDPRESS_DB_HOST: "mariadb:3306"
    hostname: wordpress
    image: "tntphoto-wordpress:php8.3-fpm-alpine"
    logging:
      options:
        max-file: "3"
        max-size: "10m"
    networks:
      - wp_net
    pull_policy: build
    volumes:
      - *tz
      - "/mnt/data/tntphoto_wordpress_data/_data:/var/www/html"
      - "/mnt/data/tntphoto_php_config/_data:/usr/local/etc/php/conf.d"
      - "/mnt/data/tntphoto_php_config/_data/zzz-logging.conf:/usr/local/etc/php-fpm.d/zzz-logging.conf:ro"
      - "/mnt/data/tntphoto_ebertek_data/_data:/var/www/ebertek"

networks:
  wp_net: {}
