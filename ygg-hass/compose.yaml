# %YAML 1.2
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json  # yamllint disable-line
---
# version: "3.9"
name: ygg-hass

networks:
  macvlan1:
    external: true

x-common: &common
  dns:
    - 10.4.21.34
    - 1.1.1.1
  dns_search:
    - ygg.nu
  restart: unless-stopped
  stop_grace_period: 5m

x-env: &env
  TZ: "UTC"

x-tz: &tz "/usr/share/zoneinfo/Etc/UTC:/etc/localtime:ro"

secrets:
  influxdb2-admin-password:
    file: influxdb2-admin-password.txt
  influxdb2-admin-token:
    file: influxdb2-admin-token.txt
  influxdb2-admin-username:
    file: influxdb2-admin-username.txt
  private.key:
    file: private.key

services:
  esphome:
    <<: *common
    container_name: esphome
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2560M
    # env_file: esphome.txt
    environment:
      <<: *env
    hostname: esphome
    image: "ghcr.io/esphome/esphome:stable"
    labels:
      traefik.enable: "true"
      traefik.http.routers.esphome.entrypoints: "websecure"
      traefik.http.routers.esphome.rule: "Host(`esphome.ebi.nu`)"
      traefik.http.routers.esphome.tls: "true"
      traefik.http.services.esphome.loadbalancer.server.port: "6052"
      traefik.http.services.esphome.loadbalancer.server.scheme: "http"
    mac_address: "0e:be:00:da:00:71"
    networks:
      macvlan1:
        ipv4_address: 10.4.21.71
        ipv6_address: 2001:9b1:25fc:6900:421::71
    privileged: true
    stop_signal: SIGINT
    volumes:
      - *tz
      - "/volume2/docker/hass/esphome:/config"

  hass:
    <<: *common
    cap_add:
      - NET_ADMIN
      - NET_RAW
    container_name: hass
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2048M
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    environment:
      <<: *env
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 60s
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:8123/ >/dev/null || exit 1"]
      timeout: 10s
    hostname: hass
    image: "ghcr.io/home-assistant/home-assistant:stable"
    labels:
      traefik.enable: "true"
      traefik.http.routers.hass.entrypoints: "websecure"
      traefik.http.routers.hass.rule: "Host(`hass.ebi.nu`)"
      traefik.http.routers.hass.tls: "true"
      traefik.http.services.hass.loadbalancer.server.port: "8123"
    mac_address: "0e:be:00:da:00:70"
    networks:
      macvlan1:
        ipv4_address: 10.4.21.70
        ipv6_address: 2001:9b1:25fc:6900:421::70
    privileged: true
    volumes:
      - *tz
      - "/run/dbus:/run/dbus"
      - "/volume2/docker/hass/config:/config"

  influxdb:
    <<: *common
    container_name: influxdb
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    environment:
      <<: *env
      DOCKER_INFLUXDB_INIT_MODE: "setup"
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN_FILE: "/run/secrets/influxdb2-admin-token"
      DOCKER_INFLUXDB_INIT_BUCKET: "home"
      DOCKER_INFLUXDB_INIT_ORG: "docs"
      DOCKER_INFLUXDB_INIT_PASSWORD_FILE: "/run/secrets/influxdb2-admin-password"
      DOCKER_INFLUXDB_INIT_USERNAME_FILE: "/run/secrets/influxdb2-admin-username"
    healthcheck:
      interval: 30s
      retries: 5
      test:
        [
          "CMD-SHELL",
          'curl -sf http://localhost:8086/health | grep -q ''"status":"pass"''',
        ]
      timeout: 10s
    hostname: influxdb
    image: "docker.io/library/influxdb:2"
    labels:
      traefik.enable: "true"
      traefik.http.routers.influxdb.entrypoints: "websecure"
      traefik.http.routers.influxdb.rule: "Host(`influxdb.ebi.nu`)"
      traefik.http.routers.influxdb.tls: "true"
      traefik.http.services.influxdb.loadbalancer.server.port: "8086"
    mac_address: "0e:be:00:da:00:72"
    networks:
      macvlan1:
        ipv4_address: 10.4.21.72
        ipv6_address: 2001:9b1:25fc:6900:421::72
    secrets:
      - influxdb2-admin-username
      - influxdb2-admin-password
      - influxdb2-admin-token
    volumes:
      - *tz
      - "/volume2/docker/hass/influxdb/data:/var/lib/influxdb2"
      - "/volume2/docker/hass/influxdb/config:/etc/influxdb2"

  matter-server:
    <<: *common
    cap_add:
      - NET_ADMIN
      - NET_RAW
    container_name: matter-server
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    environment:
      <<: *env
      BLUETOOTH_ADAPTER: "0"
      PRIMARY_INTERFACE: "eth0"
      PRODUCTION_MODE: "true"
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 60s
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:5580/ >/dev/null || exit 1"]
      timeout: 10s
    hostname: matter-server
    image: "ghcr.io/matter-js/matterjs-server:latest"
    mac_address: "0e:be:00:da:00:66"
    networks:
      macvlan1:
        driver_opts:
          com.docker.network.endpoint.sysctls: "net.ipv6.conf.IFNAME.accept_ra_rt_info_max_plen=64" # yamllint disable-line
        ipv4_address: 10.4.21.66
        ipv6_address: 2001:9b1:25fc:6900:421::66
    security_opt:
      - "apparmor:unconfined"
    stop_grace_period: 30s
    user: "1000:1000"
    volumes:
      - *tz
      - "/run/dbus:/run/dbus"
      - "/volume2/docker/hass/matter-server:/data"

  mosquitto:
    <<: *common
    container_name: mosquitto
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    environment:
      <<: *env
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 30s
      test: ["CMD-SHELL", "nc -z 127.0.0.1 1883 || exit 1"]
      timeout: 5s
    hostname: mosquitto
    image: "docker.io/library/eclipse-mosquitto:latest"
    mac_address: "0e:be:00:da:00:67"
    networks:
      macvlan1:
        ipv4_address: 10.4.21.67
        ipv6_address: 2001:9b1:25fc:6900:421::67
    volumes:
      - *tz
      - "/volume2/docker/hass/mosquitto/config:/mosquitto/config"
      - "/volume2/docker/hass/mosquitto/data:/mosquitto/data"
      - "/volume2/docker/hass/mosquitto/log:/mosquitto/log"

  ps5-mqtt:
    <<: *common
    container_name: ps5-mqtt
    depends_on:
      mosquitto:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    entrypoint: /app/run-standalone.sh
    environment:
      <<: *env
      CONFIG_PATH: "/config/options.json"
      DEBUG: "@ha:ps5:*"
    healthcheck:
      interval: 5m
      retries: 2
      start_period: 30s
      test:
        ["CMD-SHELL", "ls -l /proc/*/exe 2>/dev/null | grep -q node || exit 1"]
      timeout: 10s
    hostname: ps5-mqtt
    image: "ghcr.io/funkeyflo/ps5-mqtt/amd64:latest"
    labels:
      com.centurylinklabs.watchtower.depends-on: "mosquitto"
    mac_address: "0e:be:00:da:00:68"
    networks:
      macvlan1:
        aliases:
          - df2164f9-ps5-mqtt
        ipv4_address: 10.4.21.68
        ipv6_address: 2001:9b1:25fc:6900:421::68
    stop_signal: SIGKILL
    volumes:
      - *tz
      - "/volume2/docker/hass/ps5-mqtt:/config"

  scrypted:
    <<: *common
    container_name: scrypted
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4096M
    devices:
      - "/dev/dri:/dev/dri"
    environment:
      <<: *env
      SCRYPTED_DOCKER_AVAHI: "true"
      SCRYPTED_NVR_VOLUME: "/nvr"
      SCRYPTED_WEBHOOK_UPDATE: "http://watchtower:8080/v1/update"
      SCRYPTED_WEBHOOK_UPDATE_AUTHORIZATION: "Bearer demotoken"
    group_add:
      - "44"
      - "991"
    healthcheck:
      interval: 1m30s
      retries: 3
      start_period: 40s
      test:
        [
          "CMD",
          "curl",
          "-f",
          "-k",
          "-L",
          "http://127.0.0.1:11080/endpoint/@scrypted/core/public/#/",
        ]
      timeout: 10s
    hostname: scrypted
    image: "ghcr.io/koush/scrypted:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.scrypted.entrypoints: "websecure"
      traefik.http.routers.scrypted.rule: "Host(`scrypted.ebi.nu`)"
      traefik.http.routers.scrypted.tls: "true"
      traefik.http.services.scrypted.loadbalancer.server.port: "11080"
    logging:
      options:
        max-file: "2"
        max-size: "5m"
    mac_address: "0e:be:00:da:00:76"
    networks:
      macvlan1:
        ipv4_address: 10.4.21.76
        ipv6_address: 2001:9b1:25fc:6900:421::76
    volumes:
      - *tz
      - "/volume2/docker/hass/scrypted/nvr:/nvr"
      - "/volume2/docker/hass/scrypted/volume:/server/volume"

  vonage:
    <<: *common
    container_name: vonage
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 128M
    env_file: vonage.txt
    environment:
      <<: *env
      BASE_URL: "https://vonage.ebi.nu"
      HA_BASE_URL: "http://hass:8123"
      LOG_LEVEL: "debug"
      REDACT_LOGS: "false"
      VALIDATE_VONAGE_SMS_SIGNATURE: "true"
    hostname: vonage
    image: "ghcr.io/ebertek/vonage-ha-bridge:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.vonage.entrypoints: "websecure"
      traefik.http.routers.vonage.rule: "Host(`vonage.ebi.nu`)"
      traefik.http.routers.vonage.tls: "true"
      traefik.http.services.vonage.loadbalancer.server.port: "3000"
    mac_address: "0e:be:00:da:00:73"
    networks:
      macvlan1:
        ipv4_address: 10.4.21.73
        ipv6_address: 2001:9b1:25fc:6900:421::73
    secrets:
      - private.key
    volumes:
      - *tz

  zigbee2mqtt:
    <<: *common
    container_name: zigbee2mqtt
    depends_on:
      mosquitto:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    environment:
      <<: *env
    group_add:
      - dialout
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8099/ >/dev/null 2>&1 || exit 1",
        ]
      timeout: 5s
    hostname: zigbee2mqtt
    image: "docker.io/koenkk/zigbee2mqtt:latest"
    labels:
      com.centurylinklabs.watchtower.depends-on: "mosquitto"
      traefik.enable: "true"
      traefik.http.routers.zigbee2mqtt.entrypoints: "websecure"
      traefik.http.routers.zigbee2mqtt.rule: "Host(`zigbee2mqtt.ebi.nu`)"
      traefik.http.routers.zigbee2mqtt.tls: "true"
      traefik.http.services.zigbee2mqtt.loadbalancer.server.port: "8099"
    mac_address: "0e:be:00:da:00:69"
    networks:
      macvlan1:
        ipv4_address: 10.4.21.69
        ipv6_address: 2001:9b1:25fc:6900:421::69
    volumes:
      - *tz
      - "/volume2/docker/hass/zigbee2mqtt:/app/data"
      - "/run/udev:/run/udev:ro"
