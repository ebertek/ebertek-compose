# %YAML 1.2
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json  # yamllint disable-line
---
# version: "3.9"
name: ygg-core

networks:
  macvlan1:
    external: true

x-common: &common
  dns:
    - 10.4.21.34
    - 1.1.1.1
  dns_search:
    - ygg.nu
  restart: unless-stopped
  stop_grace_period: 2m

x-env: &env
  TZ: "UTC"

x-tz: &tz "/usr/share/zoneinfo/Etc/UTC:/etc/localtime:ro"

secrets:
  cloudflare_api_token:
    file: cloudflare_api_token.txt
  postgres-passwd:
    file: postgres-passwd.txt
  postgres-user:
    file: postgres-user.txt

services:
  cloudflare-ddns:
    <<: *common
    cap_drop: [all]
    container_name: cloudflare-ddns
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 128M
    environment:
      <<: *env
      CLOUDFLARE_API_TOKEN_FILE: "/run/secrets/cloudflare_api_token"
      DOMAINS: "ygg.ebi.nu"
      PROXIED: "false"
    hostname: cloudflare-ddns
    image: "docker.io/favonia/cloudflare-ddns:1"
    network_mode: host
    read_only: true
    secrets:
      - cloudflare_api_token
    security_opt: [no-new-privileges:true]
    user: "1028:100"
    volumes:
      - *tz

  cloudflared:
    <<: *common
    command: tunnel run
    container_name: cloudflared
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 128M
    env_file: cloudflared.txt
    environment:
      <<: *env
      TUNNEL_METRICS: "0.0.0.0:60123"
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 60s
      test:
        [
          "CMD",
          "cloudflared",
          "tunnel",
          "--metrics",
          "localhost:60123",
          "ready",
        ]
      timeout: 30s
    hostname: cloudflared
    image: "docker.io/cloudflare/cloudflared:latest"
    network_mode: host
    ulimits:
      nofile:
        soft: 70000
        hard: 70000
    volumes:
      - *tz

  dns:
    <<: *common
    container_name: dns
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
        reservations:
          cpus: "0.002"
          memory: 256M
    environment:
      <<: *env
      DNS_SERVER_DOMAIN: "dns"
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 10s
      test:
        [
          "CMD-SHELL",
          'grep -i "$(printf ''%08x:%04x'' 0 53)" /proc/net/udp >/dev/null 2>&1 || exit 1',
        ]
      timeout: 5s
    hostname: dns
    image: "docker.io/technitium/dns-server:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.dns.entrypoints: "websecure"
      traefik.http.routers.dns.rule: "Host(`dns.ebi.nu`)"
      traefik.http.routers.dns.tls: "true"
      traefik.http.services.dns.loadbalancer.server.port: "5380"
    mac_address: "0e:be:00:da:00:34"
    networks:
      macvlan1:
        ipv4_address: 10.4.21.34
        ipv6_address: 2001:9b1:25fc:6900:421::34
    sysctls:
      net.ipv4.ip_local_port_range: "1024 65000"
    volumes:
      - *tz
      - "/volume2/docker/dns:/etc/dns"

  keycloak:
    <<: *common
    command: start
    container_name: keycloak
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2048M
    env_file: keycloak.txt
    environment:
      <<: *env
      JAVA_OPTS_KC_HEAP: "-Xms256m -Xmx1024m"
      KC_DB: "postgres"
      KC_DB_URL_DATABASE: "keycloak"
      KC_DB_URL_HOST: "postgres"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: "keycloak.ebi.nu"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
    healthcheck:
      interval: 15s
      retries: 5
      start_period: 120s
      test:
        [
          "CMD-SHELL",
          "bash -c '{ printf \"HEAD /health/ready HTTP/1.0\\r\\n\\r\\n\" >&0; grep -q \"HTTP/1.0 200\"; } 0<>/dev/tcp/localhost/9000' || exit 1",
        ]
      timeout: 5s
    hostname: keycloak
    image: "quay.io/keycloak/keycloak:latest"
    labels:
      traefik.enable: "true"
      traefik.http.routers.keycloak.entrypoints: "websecure"
      traefik.http.routers.keycloak.rule: "Host(`keycloak.ebi.nu`)"
      traefik.http.routers.keycloak.tls: "true"
      traefik.http.services.keycloak.loadbalancer.passhostheader: "true"
      traefik.http.services.keycloak.loadbalancer.server.port: "8080"
    mac_address: "0e:be:00:da:00:91"
    networks:
      macvlan1:
        ipv4_address: 10.4.21.91
        ipv6_address: 2001:9b1:25fc:6900:421::91
    ulimits:
      nofile:
        soft: 1024000
        hard: 1024000
    volumes:
      - *tz
      - "/volume2/docker/keycloak/providers:/opt/keycloak/providers"

  oauth2-proxy:
    <<: *common
    container_name: oauth2-proxy
    depends_on:
      keycloak:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    env_file: oauth2-proxy.txt
    environment:
      <<: *env
      OAUTH2_PROXY_CLIENT_ID: "oauth2-proxy"
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: "S256"
      OAUTH2_PROXY_COOKIE_DOMAINS: ".ebi.nu"
      OAUTH2_PROXY_COOKIE_SAMESITE: "lax"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_OIDC_ISSUER_URL: "https://keycloak.ebi.nu/realms/ygg"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_PROVIDER: "oidc"
      OAUTH2_PROXY_PROVIDER_DISPLAY_NAME: "Keycloak"
      OAUTH2_PROXY_REAL_CLIENT_IP_HEADER: "X-Forwarded-For"
      OAUTH2_PROXY_REDIRECT_URL: "https://oauth2-proxy.ebi.nu/oauth2/callback"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SCOPE: "openid email profile"
      OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_TRUSTED_PROXY_IPS: "10.4.21.44/32,2001:9b1:25fc:6900:421::44/128"
      OAUTH2_PROXY_UPSTREAMS: "static://202"
      OAUTH2_PROXY_WHITELIST_DOMAINS: ".ebi.nu"
    hostname: oauth2-proxy
    image: "quay.io/oauth2-proxy/oauth2-proxy:latest"
    label_file: oauth2-proxy.labels
    labels:
      traefik.enable: "true"
      traefik.http.routers.oauth2-proxy.entrypoints: "websecure"
      traefik.http.routers.oauth2-proxy.rule: "Host(`oauth2-proxy.ebi.nu`)"
      traefik.http.routers.oauth2-proxy.tls: "true"
      traefik.http.services.oauth-backend.loadbalancer.server.port: "4180"
      traefik.http.middlewares.arr-chain.chain.middlewares: "oauth-errors,oauth-auth,arr-basic"
      traefik.http.middlewares.oauth-auth.forwardauth.address: "http://oauth2-proxy:4180/oauth2/auth"
      traefik.http.middlewares.oauth-auth.forwardauth.authResponseHeaders: "Authorization,Remote-Email,Remote-Groups,Remote-Name,Remote-User,X-Auth-Request-Email,X-Auth-Request-Preferred-Username,X-Auth-Request-Redirect,X-Auth-Request-User,X-Forwarded-User"
      traefik.http.middlewares.oauth-auth.forwardauth.maxResponseBodySize: "1048576"
      traefik.http.middlewares.oauth-auth.forwardauth.trustForwardHeader: "true"
      traefik.http.middlewares.oauth-errors.errors.query: "/oauth2/sign_in?rd={url}"
      traefik.http.middlewares.oauth-errors.errors.service: "oauth-backend"
      traefik.http.middlewares.oauth-errors.errors.status: "401-403"
    mac_address: "0e:be:00:da:00:92"
    networks:
      macvlan1:
        ipv4_address: 10.4.21.92
        ipv6_address: 2001:9b1:25fc:6900:421::92
    volumes:
      - *tz

  postgres:
    <<: *common
    container_name: postgres
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1024M
    environment:
      <<: *env
      POSTGRES_PASSWORD_FILE: "/run/secrets/postgres-passwd"
      POSTGRES_USER_FILE: "/run/secrets/postgres-user"
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 15s
      test:
        [
          "CMD-SHELL",
          'pg_isready -h 127.0.0.1 -p 5432 -U "$(cat /run/secrets/postgres-user)" -d postgres',
        ]
      timeout: 5s
    hostname: postgres
    image: "docker.io/library/postgres:17"
    mac_address: "0e:be:00:da:00:90"
    networks:
      macvlan1:
        ipv4_address: 10.4.21.90
        ipv6_address: 2001:9b1:25fc:6900:421::90
    secrets:
      - postgres-passwd
      - postgres-user
    shm_size: 128mb
    user: "999:999"
    volumes:
      - *tz
      - "/volume2/docker/postgres:/var/lib/postgresql/data"

  traefik:
    <<: *common
    container_name: traefik
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    environment:
      <<: *env
      TRAEFIK_API_DASHBOARD: "true"
      TRAEFIK_API_INSECURE: "true"

      TRAEFIK_LOG_LEVEL: "WARN"
      TRAEFIK_LOG_FORMAT: "json"

      TRAEFIK_ACCESSLOG: "false"
      TRAEFIK_ACCESSLOG_FORMAT: "json"

      TRAEFIK_METRICS_PROMETHEUS: "true"
      TRAEFIK_METRICS_PROMETHEUS_ADDENTRYPOINTSLABELS: "true"
      TRAEFIK_METRICS_PROMETHEUS_ADDROUTERSLABELS: "true"
      TRAEFIK_METRICS_PROMETHEUS_ADDSERVICESLABELS: "true"
      TRAEFIK_METRICS_PROMETHEUS_BUCKETS: "0.1,0.3,1.2,5.0"

      TRAEFIK_PROVIDERS_DOCKER: "true"
      TRAEFIK_PROVIDERS_DOCKER_ENDPOINT: "unix:///var/run/docker.sock"
      TRAEFIK_PROVIDERS_DOCKER_EXPOSEDBYDEFAULT: "false"
      TRAEFIK_PROVIDERS_DOCKER_NETWORK: "macvlan1"
      TRAEFIK_PROVIDERS_DOCKER_DEFAULTRULE: "Host(`{{ trimPrefix `/` .Name }}.ebi.nu`)"

      TRAEFIK_PROVIDERS_FILE_FILENAME: "/etc/traefik/dynamic.yml"
      TRAEFIK_PROVIDERS_FILE_WATCH: "true"

      TRAEFIK_ENTRYPOINTS_WEB_ADDRESS: ":80"
      TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_TO: "websecure"
      TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_SCHEME: "https"
      TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_PERMANENT: "true"

      TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS: ":443"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_FORWARDEDHEADERS_TRUSTEDIPS: "10.4.21.1/32"

      TRAEFIK_SERVERSTRANSPORT_INSECURESKIPVERIFY: "true"

      TRAEFIK_EXPERIMENTAL_PLUGINS_GEOBLOCK_MODULENAME: "github.com/PascalMinder/geoblock"
      TRAEFIK_EXPERIMENTAL_PLUGINS_GEOBLOCK_VERSION: "v0.3.7"
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080 >/dev/null || exit 1"]
      timeout: 5s
    hostname: traefik
    image: "docker.io/library/traefik:latest"
    logging:
      options:
        max-file: "2"
        max-size: "5m"
    mac_address: "0e:be:00:da:00:44"
    networks:
      macvlan1:
        ipv4_address: 10.4.21.44
        ipv6_address: 2001:9b1:25fc:6900:421::44
    volumes:
      - *tz
      - "/volume2/docker/traefik/geoblock:/var/lib/geoblock"
      - "/volume2/docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro"
      - "/volume2/docker/acmesh/ebi.nu_ecc/:/certs:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  watchtower:
    container_name: watchtower
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 128M
    environment:
      TZ: "UTC"
      NO_COLOR: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_HTTP_API_METRICS: "true"
      WATCHTOWER_HTTP_API_PERIODIC_POLLS: "true"
      WATCHTOWER_HTTP_API_TOKEN: "demotoken"
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_LOG_FORMAT: "JSON"
    hostname: watchtower
    image: "docker.io/nickfedor/watchtower:latest"
    mac_address: "0e:be:00:da:00:47"
    networks:
      macvlan1:
        ipv4_address: 10.4.21.47
        ipv6_address: 2001:9b1:25fc:6900:421::47
    privileged: true
    restart: unless-stopped
    stop_grace_period: 1m
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/volume2/docker/watchtower/config.json:/config.json"
