# %YAML 1.2
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json  # yamllint disable-line
---
# version: "3.9"
name: ygg-download

networks:
  macvlan1:
    external: true

x-common: &common
  dns_search:
    - ygg.nu
  restart: "no"
  stop_grace_period: 1m

x-env: &env
  PUID: "1028"
  PGID: "100"
  TZ: "UTC"

x-tz: &tz "/usr/share/zoneinfo/Etc/UTC:/etc/localtime:ro"

services:
  download:
    <<: *common
    container_name: download
    cpu_count: 1
    depends_on:
      gluetun:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # cpus: "1"
          memory: 512M
    environment:
      <<: *env
      QBT_LEGAL_NOTICE: "confirm"
      QBT_TORRENTING_PORT: "56213"
      QBT_VERSION: "latest"
      QBT_WEBUI_PORT: "8080"
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/ || exit 1"]
      timeout: 5s
    image: "docker.io/qbittorrentofficial/qbittorrent-nox:latest"
    labels:
      com.centurylinklabs.watchtower.depends-on: "gluetun"
    network_mode: "container:gluetun"
    read_only: false
    tmpfs:
      - /tmp
    tty: true
    volumes:
      - *tz
      - "/volume1/Downloads:/downloads"
      - "/volume2/docker/qbittorrent:/config"
      - "/volume2/docker/qbittorrent/ipv6-update.sh:/etc/periodic/hourly/ipv6-update.sh"

  gluetun:
    <<: *common
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    cpu_count: 1
    container_name: gluetun
    deploy:
      resources:
        limits:
          # cpus: "1"
          memory: 256M
    devices:
      - "/dev/net/tun:/dev/net/tun"
    dns:
      - 10.64.0.1
      - 10.4.21.34
      - 1.1.1.1
    env_file: gluetun.txt
    environment:
      <<: *env
      BLOCK_MALICIOUS: "off"
      DNS_UNBLOCK_HOSTNAMES: "cloudflare.com,t.myanonamouse.net,t.ncore.sh,sptracker.cc,superbits.org,tracker.superbits.org"
      FIREWALL_VPN_INPUT_PORTS: "56213"
      SERVER_CITIES: "Gothenburg"
      UPDATER_PERIOD: "24h"
      VPN_SERVICE_PROVIDER: "mullvad"
      VPN_TYPE: "wireguard"
      WIREGUARD_ADDRESSES: "10.75.26.2/32,fc00:bbbb:bbbb:bb01::c:1a01/128"
      WIREGUARD_ENDPOINT_PORT: "53"
    healthcheck:
      interval: 5s
      retries: 3
      start_period: 40s
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      timeout: 5s
    hostname: gluetun
    image: "docker.io/qmcgaw/gluetun:v3.40.4"
    labels:
      traefik.enable: "true"
      traefik.http.routers.download.entrypoints: "websecure"
      traefik.http.routers.download.rule: "Host(`download.ebi.nu`)"
      traefik.http.routers.download.service: "download"
      traefik.http.routers.download.tls: "true"
      traefik.http.services.download.loadbalancer.server.port: "8080"
      traefik.http.routers.mousehole.entrypoints: "websecure"
      traefik.http.routers.mousehole.rule: "Host(`mousehole.ebi.nu`)"
      traefik.http.routers.mousehole.service: "mousehole"
      traefik.http.routers.mousehole.tls: "true"
      traefik.http.services.mousehole.loadbalancer.server.port: "5010"
    mac_address: "0e:be:00:da:00:39"
    networks:
      macvlan1:
        ipv4_address: 10.4.21.39
        ipv6_address: 2001:9b1:25fc:6900:421::39
    privileged: true
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
      net.ipv6.conf.all.disable_ipv6: 0
    volumes:
      - *tz
      - "/volume2/docker/gluetun:/gluetun"
      - "/lib/modules:/lib/modules:ro"

  mousehole:
    <<: *common
    container_name: mousehole
    cpu_count: 1
    depends_on:
      gluetun:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # cpus: "1"
          memory: 256M
    environment:
      <<: *env
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test: ["CMD-SHELL", "curl -fs http://localhost:5010/state || exit 1"]
      timeout: 5s
    image: "docker.io/tmmrtn/mousehole:latest"
    labels:
      com.centurylinklabs.watchtower.depends-on: "gluetun"
    network_mode: "container:gluetun"
    volumes:
      - *tz
      - "/volume2/docker/qbittorrent/mousehole:/srv/mousehole"
