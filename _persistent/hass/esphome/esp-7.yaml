---
esphome:
  area: Hall
  compile_process_limit: 2
  friendly_name: esp-hall-1
  min_version: 2025.11.0
  name: esp-7

esp32:
  board: m5stack-atoms3
  flash_size: 8MB
  framework:
    type: esp-idf
  variant: esp32s3

api:
  encryption:
    key: !secret api_7
  reboot_timeout: 0s

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_7

logger:
  level: VERY_VERBOSE

wifi:
  domain: .ygg.nu
  password: !secret wifi_password
  power_save_mode: none
  ssid: !secret wifi_ssid

binary_sensor:
  - platform: status
    device_class: connectivity
    entity_category: diagnostic
    id: system_status
    name: Node Status
  - platform: gpio
    filters:
      - delayed_off: 10ms
    id: builtin_button
    name: Button
    on_press:
      - light.toggle: led
    pin:
      inverted: true
      mode:
        input: true
        pullup: true
      number: GPIO41

bluetooth_proxy:
  active: true

button:
  - platform: restart
    id: restart_btn
    name: Restart
    entity_category: diagnostic
  - platform: safe_mode
    id: button_safe_mode
    name: Safe Mode Boot
    entity_category: diagnostic
  - platform: factory_reset
    id: factory_reset_btn
    name: Factory Reset
    entity_category: diagnostic

esp32_ble_tracker:
  scan_parameters:
    active: true

light:
  - platform: esp32_rmt_led_strip
    chipset: ws2812
    id: led
    name: LED
    num_leds: 4
    pin: GPIO35
    restore_mode: RESTORE_DEFAULT_OFF
    rgb_order: GRB
    rmt_symbols: 192
    use_dma: true

# M5Stack RF433R on Port.B.
# Black=GND, Red=5V, Yellow=NC/GPIO7, White=RF_RX/GPIO8.
remote_receiver:
  id: nexa_433_receiver
  pin:
    number: GPIO8
    mode:
      input: true
      pullup: false
    inverted: false
  dump:
    - raw
    - rc_switch
  tolerance: 50%
  filter: 250us
  idle: 10ms
  buffer_size: 16kb

# Built-in IR transmitter, not 433 MHz RF.
remote_transmitter:
  - id: builtin_ir_tx
    carrier_duty_percent: 50%
    non_blocking: true
    pin: GPIO4

sensor:
  - platform: uptime
    device_class: duration
    entity_category: diagnostic
    icon: mdi:timer-outline
    id: uptime_s
    name: Uptime
    state_class: total_increasing
    update_interval: 300s
  - platform: wifi_signal
    accuracy_decimals: 0
    device_class: signal_strength
    entity_category: diagnostic
    icon: mdi:wifi-strength-3
    id: wifi_signal_db
    name: Wi-Fi Signal
    state_class: measurement
    unit_of_measurement: dBm
    update_interval: 60s
  - platform: internal_temperature
    id: esp32_internal_temperature
    name: ESP32 Internal Temperature
    entity_category: diagnostic
    update_interval: 60s

text_sensor:
  - platform: version
    id: esphome_version
    name: ESPHome Version
    entity_category: diagnostic
  - platform: wifi_info
    ip_address:
      id: wifi_ip_address
      name: IP Address
      entity_category: diagnostic
    mac_address:
      id: wifi_mac_address
      name: MAC Address
      entity_category: diagnostic
    ssid:
      id: connected_ssid
      name: Connected SSID
      entity_category: diagnostic
