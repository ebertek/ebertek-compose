---
esphome:
  area: Hall
  compile_process_limit: 2
  friendly_name: esp-hall-1
  min_version: 2025.11.0
  name: esp-7

esp32:
  board: m5stack-atoms3
  flash_size: 8MB
  framework:
    type: esp-idf
  variant: esp32s3

api:
  encryption:
    key: !secret api_7
  reboot_timeout: 0s

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_7

logger:

wifi:
  domain: .ygg.nu
  password: !secret wifi_password
  power_save_mode: none
  ssid: !secret wifi_ssid

binary_sensor:
  - platform: status
    device_class: connectivity
    entity_category: diagnostic
    id: system_status
    name: Node Status
  - platform: gpio
    filters:
      - delayed_off: 10ms
    id: builtin_button
    name: Button
    on_press:
      - light.toggle: led
    pin:
      inverted: true
      mode:
        input: true
        pullup: true
      number: GPIO41

bluetooth_proxy:
  active: true

button:
  - platform: restart
    id: restart_btn
    name: Restart
    entity_category: diagnostic
  - platform: safe_mode
    id: button_safe_mode
    name: Safe Mode Boot
    entity_category: diagnostic
  - platform: factory_reset
    id: factory_reset_btn
    name: Factory Reset
    entity_category: diagnostic
  - platform: template
    name: "Nexa Uppe ON"
    on_press:
      - remote_transmitter.transmit_nexa:
          transmitter_id: nexa_433_tx
          device: 0xA2366
          group: 0
          state: 1
          channel: 1
          level: 0
          repeat:
            times: 10
            wait_time: 10ms
  - platform: template
    name: "Nexa Uppe OFF"
    on_press:
      - remote_transmitter.transmit_nexa:
          transmitter_id: nexa_433_tx
          device: 0xA2366
          group: 0
          state: 0
          channel: 1
          level: 0
          repeat:
            times: 10
            wait_time: 10ms
  - platform: template
    name: "Nexa Nere ON"
    on_press:
      - remote_transmitter.transmit_nexa:
          transmitter_id: nexa_433_tx
          device: 0xA2366
          group: 0
          state: 1
          channel: 0
          level: 0
          repeat:
            times: 10
            wait_time: 10ms
  - platform: template
    name: "Nexa Nere OFF"
    on_press:
      - remote_transmitter.transmit_nexa:
          transmitter_id: nexa_433_tx
          device: 0xA2366
          group: 0
          state: 0
          channel: 0
          level: 0
          repeat:
            times: 10
            wait_time: 10ms

esp32_ble_tracker:
  scan_parameters:
    active: true

light:
  - platform: esp32_rmt_led_strip
    chipset: ws2812
    id: led
    name: LED
    num_leds: 4
    pin: GPIO35
    restore_mode: RESTORE_DEFAULT_OFF
    rgb_order: GRB
    rmt_symbols: 192
    use_dma: true

# M5Stack RF433R on Port.B.
# Black=GND, Red=5V, Yellow=NC/GPIO7, White=RF_RX/GPIO8.
# remote_receiver:
#   id: nexa_433_receiver
#   buffer_size: 16kb
#   dump:
#     - raw
#     - rc_switch
#   filter: 250us
#   idle: 10ms
#   pin:
#     inverted: false
#     mode:
#       input: true
#       pullup: false
#     number: GPIO8
#   tolerance: 50%

remote_transmitter:
  - id: nexa_433_tx
    # M5Stack RF433T on Port.B.
    # Black=GND, Red=5V, Yellow=RF_TX/GPIO7, White=NC/GPIO8.
    carrier_duty_percent: 100%
    non_blocking: true
    pin: GPIO7
  - id: builtin_ir_tx
    # Built-in IR transmitter, not 433 MHz RF.
    carrier_duty_percent: 50%
    non_blocking: true
    pin: GPIO4

sensor:
  - platform: uptime
    device_class: duration
    entity_category: diagnostic
    icon: mdi:timer-outline
    id: uptime_s
    name: Uptime
    state_class: total_increasing
    update_interval: 300s
  - platform: wifi_signal
    accuracy_decimals: 0
    device_class: signal_strength
    entity_category: diagnostic
    icon: mdi:wifi-strength-3
    id: wifi_signal_db
    name: Wi-Fi Signal
    state_class: measurement
    unit_of_measurement: dBm
    update_interval: 60s
  - platform: internal_temperature
    id: esp32_internal_temperature
    name: ESP32 Internal Temperature
    entity_category: diagnostic
    update_interval: 60s

text_sensor:
  - platform: version
    id: esphome_version
    name: ESPHome Version
    entity_category: diagnostic
  - platform: wifi_info
    ip_address:
      id: wifi_ip_address
      name: IP Address
      entity_category: diagnostic
    mac_address:
      id: wifi_mac_address
      name: MAC Address
      entity_category: diagnostic
    ssid:
      id: connected_ssid
      name: Connected SSID
      entity_category: diagnostic
