---
esphome:
  area: Crawl space
  compile_process_limit: 2
  friendly_name: esp-crawl-1
  min_version: 2026.3.0
  name: esp-4

esp32:
  board: m5stack-atoms3
  flash_size: 8MB
  framework:
    type: esp-idf
  variant: esp32s3

api:
  encryption:
    key: !secret api_4
  reboot_timeout: 0s

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_4

logger:

wifi:
  domain: .ygg.nu
  password: !secret wifi_password
  ssid: !secret wifi_ssid

binary_sensor:
  - platform: status
    device_class: connectivity
    entity_category: diagnostic
    id: system_status
    name: Node Status
  - platform: gpio
    filters:
      - delayed_off: 10ms
    id: btn
    name: Button
    pin:
      inverted: true
      mode:
        input: true
        pullup: true
      number: GPIO41

bluetooth_proxy:
  active: true

button:
  - platform: safe_mode
    id: button_safe_mode
    name: Safe Mode Boot
  - platform: factory_reset
    id: factory_reset_btn
    name: Factory reset

esp32_ble_tracker:
  scan_parameters:
    active: true

i2c:
  - id: bus_abc
    scan: true
    scl: GPIO39
    sda: GPIO38

light:
  - platform: esp32_rmt_led_strip
    chipset: ws2812
    id: led
    name: LED
    num_leds: 4
    pin: GPIO35
    restore_mode: RESTORE_DEFAULT_OFF
    rgb_order: GRB
    rmt_symbols: 192
    use_dma: true

remote_transmitter:
  carrier_duty_percent: 50%
  non_blocking: true
  pin: GPIO4

sensor:
  - platform: uptime
    device_class: duration
    entity_category: diagnostic
    icon: mdi:timer-outline
    id: uptime_s
    name: Uptime
    state_class: total_increasing
    update_interval: 300s
  - platform: wifi_signal
    accuracy_decimals: 0
    device_class: signal_strength
    entity_category: diagnostic
    icon: mdi:wifi-strength-3
    id: wifi_signal_db
    name: Wi-Fi Signal
    state_class: measurement
    unit_of_measurement: dBm
    update_interval: 60s
  - platform: bmp280_i2c
    address: 0x76
    i2c_id: pahub1
    iir_filter: 4x
    pressure:
      id: bmp280_p
      name: BMP280 Pressure
      oversampling: 16x
    temperature:
      entity_category: diagnostic
      id: bmp280_t
      name: BMP280 Temperature
      oversampling: 16x
    update_interval: 60s
  - platform: sgp30
    address: 0x58
    compensation:
      temperature_source: sht40_t
      humidity_source: sht40_h
    eco2:
      accuracy_decimals: 0
      filters:
        - sliding_window_moving_average:
            send_every: 60
            window_size: 60
      name: eCO2
    i2c_id: pahub0
    store_baseline: yes
    tvoc:
      accuracy_decimals: 0
      device_class: volatile_organic_compounds_parts
      filters:
        - sliding_window_moving_average:
            send_every: 60
            window_size: 60
      name: TVOC
    update_interval: 1s
  - platform: sht4x
    address: 0x44
    humidity:
      id: sht40_h
      name: SHT40 Humidity
    i2c_id: pahub1
    temperature:
      id: sht40_t
      name: SHT40 Temperature
    update_interval: 60s
  - platform: absolute_humidity
    humidity: sht40_h
    id: sht40_h_abs
    name: Absolute humidity
    temperature: sht40_t
  - platform: dew_point
    humidity: sht40_h
    id: sht40_dew_point
    name: Dew point
    temperature: sht40_t
  - platform: template
    accuracy_decimals: 2
    device_class: pressure
    filters:
      - filter_out: nan
    icon: "mdi:waves-arrow-up"
    id: sht40_vpd
    lambda: |-
      const float temperature = id(sht40_t).state;
      const float humidity = id(sht40_h).state;

      if (isnan(temperature) || isnan(humidity)) {
        return NAN;
      }

      const float saturation_vapor_pressure =
          0.6108f * expf((17.27f * temperature) / (temperature + 237.3f));

      return saturation_vapor_pressure * (1.0f - humidity / 100.0f);
    name: VPD
    state_class: measurement
    update_interval: 60s
    unit_of_measurement: kPa
  - platform: template
    accuracy_decimals: 1
    device_class: temperature
    icon: "mdi:thermometer-chevron-up"
    id: sht40_dew_point_margin
    lambda: |-
      const float temperature = id(sht40_t).state;
      const float dew_point = id(sht40_dew_point).state;

      if (isnan(temperature) || isnan(dew_point)) {
        return NAN;
      }

      return temperature - dew_point;
    name: Dew Point Margin
    state_class: measurement
    unit_of_measurement: °C
    update_interval: 60s

tca9548a:
  - address: 0x70
    channels:
      - bus_id: pahub0
        channel: 0
      - bus_id: pahub1
        channel: 1
      - bus_id: pahub2
        channel: 2
      - bus_id: pahub3
        channel: 3
      - bus_id: pahub4
        channel: 4
      - bus_id: pahub5
        channel: 5
    i2c_id: bus_abc
    id: pahub
