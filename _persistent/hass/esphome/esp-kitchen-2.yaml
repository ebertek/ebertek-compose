---
esphome:
  area: Kitchen
  compile_process_limit: 2
  friendly_name: esp-kitchen-2
  min_version: 2025.11.0
  name: esp-kitchen-2

esp32:
  board: esp32-c6-devkitm-1
  framework:
    type: esp-idf
  variant: esp32c6

api:
  encryption:
    key: !secret api_6
  reboot_timeout: 0s

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_6

logger:

wifi:
  domain: .ygg.nu
  password: !secret wifi_password
  ssid: !secret wifi_ssid

binary_sensor:
  - platform: status
    device_class: connectivity
    entity_category: diagnostic
    id: system_status
    name: Node Status
  - platform: gpio
    filters:
      - delayed_off: 10ms
    name: Button
    pin:
      ignore_strapping_warning: true
      inverted: true
      mode:
        input: true
        pullup: true
      number: GPIO9

bluetooth_proxy:
  active: true

button:
  - platform: safe_mode
    id: button_safe_mode
    name: Safe Mode Boot
  - platform: factory_reset
    id: factory_reset_btn
    name: Factory reset

esp32_ble_tracker:
  scan_parameters:
    active: true

light:
  - platform: status_led
    entity_category: diagnostic
    id: led
    name: LED
    pin: GPIO7
  - platform: esp32_rmt_led_strip
    chipset: ws2812
    effects:
      - addressable_rainbow:
      - flicker:
      - random:
      - strobe:
    id: rgb
    is_rgbw: true
    name: RGB
    num_leds: 1
    pin: GPIO20
    power_supply: rgbpwr
    restore_mode: RESTORE_DEFAULT_OFF
    rgb_order: GRB

number:
  - platform: template
    id: adc_dry
    initial_value: 1550
    max_value: 3000
    min_value: 1000
    name: "ADC Dry"
    optimistic: true
    restore_value: true
    step: 1
  - platform: template
    id: adc_wet
    initial_value: 1450
    max_value: 3000
    min_value: 1000
    name: "ADC Wet"
    optimistic: true
    restore_value: true
    step: 1

power_supply:
  - id: rgbpwr
    enable_on_boot: true
    enable_time: 10ms
    keep_on_time: 10ms
    pin: GPIO19

sensor:
  - platform: uptime
    device_class: duration
    entity_category: diagnostic
    icon: mdi:timer-outline
    id: uptime_s
    name: Uptime
    state_class: total_increasing
    update_interval: 300s
  - platform: wifi_signal
    accuracy_decimals: 0
    device_class: signal_strength
    entity_category: diagnostic
    icon: mdi:wifi-strength-3
    id: wifi_signal_db
    name: Wi-Fi Signal
    state_class: measurement
    unit_of_measurement: dBm
    update_interval: 60s
  - platform: adc
    attenuation: auto
    filters:
      - median:
          send_every: 1
          send_first_at: 1
          window_size: 7
    id: voltage
    name: "Soil Moisture (V)"
    pin: GPIO1
    update_interval: 10s
  - platform: template
    id: adc_reading
    lambda: |-
      return roundf( id(voltage).state * 1000.0f );
    name: "ADC Reading"
    unit_of_measurement: "mV"
    update_interval: 10s
  - platform: template
    accuracy_decimals: 0
    id: soil_moisture_percent
    lambda: |-
      const float adc = id(adc_reading).state;
      const float dry = id(adc_dry).state;
      const float wet = id(adc_wet).state;

      if (dry == wet || isnan(adc) || isnan(dry) || isnan(wet)) {
        return NAN;
      }

      float pct = (dry - adc) / (dry - wet) * 100.0f;
      if (pct < 0.0f) pct = 0.0f;
      if (pct > 100.0f) pct = 100.0f;
      return pct;
    name: "Soil Moisture (%)"
    unit_of_measurement: "%"
    update_interval: 10s

text_sensor:
  - platform: template
    icon: "mdi:water-percent"
    lambda: |-
      const float adc = id(adc_reading).state;
      const float dry = id(adc_dry).state;
      const float wet = id(adc_wet).state;

      if (isnan(adc) || isnan(dry) || isnan(wet) || dry == wet) {
        return {"Unknown"};
      }

      if (adc >= dry) {
        return {"Dry"};
      } else if (adc >= wet) {
        return {"Wet"};
      } else {
        return {"Saturated"};
      }
    name: "Soil Moisture"
    update_interval: 10s

switch:
  - platform: gpio
    icon: "mdi:water-pump"
    id: water_pump
    name: "Water pump"
    on_turn_on:
      - delay: 30s
      - switch.turn_off: water_pump
    pin: GPIO2
    restore_mode: RESTORE_DEFAULT_OFF
