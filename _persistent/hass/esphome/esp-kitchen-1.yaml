---
esphome:
  area: Kitchen
  compile_process_limit: 2
  friendly_name: esp-kitchen-1
  min_version: 2025.11.0
  name: esp-kitchen-1

esp32:
  board: esp32-c6-devkitm-1
  framework:
    type: esp-idf
  variant: esp32c6

api:
  encryption:
    key: !secret api_5
  reboot_timeout: 0s

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_5

logger:

wifi:
  domain: .ygg.nu
  password: !secret wifi_password
  ssid: !secret wifi_ssid

binary_sensor:
  - platform: status
    device_class: connectivity
    entity_category: diagnostic
    id: system_status
    name: Node Status
  - platform: gpio
    filters:
      - delayed_off: 10ms
    name: Button
    pin:
      ignore_strapping_warning: true
      inverted: true
      mode:
        input: true
        pullup: true
      number: GPIO9

bluetooth_proxy:
  active: true

button:
  - platform: safe_mode
    id: button_safe_mode
    name: Safe Mode Boot
  - platform: factory_reset
    id: factory_reset_btn
    name: Factory reset

esp32_ble_tracker:
  scan_parameters:
    active: true

i2c:
  frequency: 100kHz
  scan: true
  scl: GPIO1
  sda: GPIO2

light:
  - platform: status_led
    entity_category: diagnostic
    id: led
    name: LED
    pin: GPIO7
  - platform: esp32_rmt_led_strip
    chipset: ws2812
    effects:
      - addressable_rainbow:
      - flicker:
      - random:
      - strobe:
    id: rgb
    is_rgbw: true
    name: RGB
    num_leds: 1
    pin: GPIO20
    power_supply: rgbpwr
    restore_mode: RESTORE_DEFAULT_OFF
    rgb_order: GRB

power_supply:
  - id: rgbpwr
    enable_on_boot: true
    enable_time: 10ms
    keep_on_time: 10ms
    pin: GPIO19

sensor:
  - platform: uptime
    device_class: duration
    entity_category: diagnostic
    icon: mdi:timer-outline
    id: uptime_s
    name: Uptime
    state_class: total_increasing
    update_interval: 300s
  - platform: wifi_signal
    accuracy_decimals: 0
    device_class: signal_strength
    entity_category: diagnostic
    icon: mdi:wifi-strength-3
    id: wifi_signal_db
    name: Wi-Fi Signal
    state_class: measurement
    unit_of_measurement: dBm
    update_interval: 60s
  - platform: kmeteriso
    internal_temperature:
      accuracy_decimals: 1
      device_class: temperature
      id: kmeteriso_internal_temperature
      name: "KMeterISO Internal Temperature"
      state_class: measurement
      unit_of_measurement: "°C"
    temperature:
      accuracy_decimals: 1
      device_class: temperature
      id: probe_temperature
      name: "Stove Temperature"
      state_class: measurement
      unit_of_measurement: "°C"
