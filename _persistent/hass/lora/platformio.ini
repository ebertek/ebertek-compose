[platformio]
default_envs = lora-1, lora-2

[env:lora-1]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
build_src_dir = lora-1
build_flags = -I include
lib_deps =
    bblanchon/ArduinoJson
    knolleary/PubSubClient
    jgromes/RadioLib

[env:lora-2]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
build_src_dir = lora-2
build_flags = -I include
lib_deps =
    bblanchon/ArduinoJson
    jgromes/RadioLib
