---
global:
  evaluation_interval: 30s
  scrape_interval: 30s

rule_files:
  - rules_compat.yml

scrape_configs:
  - job_name: "hass"
    authorization:
      credentials_file: /run/secrets/hass-bearer-token
    metrics_path: /api/prometheus
    scheme: https
    scrape_interval: 60s
    static_configs:
      - targets: ["hass.ygg.nu:8123"]

  - job_name: "immich_api"
    static_configs:
      - targets: ["immich-server.ygg.nu:8081"]

  - job_name: "immich_microservices"
    static_configs:
      - targets: ["immich-server.ygg.nu:8082"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "traefik"
    metrics_path: /metrics
    static_configs:
      - targets: ["traefik.ygg.nu:8080"]

  - job_name: "watchtower"
    bearer_token: demotoken
    metrics_path: /v1/metrics
    static_configs:
      - targets: ["watchtower.ygg.nu:8080"]

  - job_name: "birdnet"
    static_configs:
      - targets: ["birdnet.ygg.nu:8090"]

  - job_name: "cloudflared"
    static_configs:
      - targets: ["yggdrasil.ygg.nu:60123"]
